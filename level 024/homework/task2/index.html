<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inline Style</title>
</head>

<body>

    <h1 style="color: blue; font-size: 40px;">
        ჩემი ვებგვერდი
    </h1>

    <h2 style="color: green; font-family: Arial;">
        ჩემ შესახებ
    </h2>

    <p style="background-color: yellow;">
        <b>ეს არის გამუქებული ტექსტი</b>,
        <i>დახრილი ტექსტი</i> და
        <u>ხაზგასმული ტექსტი</u>.
    </p>

    <img 
        src="https://picsum.photos/200"
        alt="image"
        style="width: 200px; border: 2px solid black;"
    >

    <br><br>

    <button style="background-color: red; color: white;">
        დააჭირე
    </button>

</body>
</html>
