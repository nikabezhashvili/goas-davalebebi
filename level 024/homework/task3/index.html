<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internal CSS</title>

    <style>
        body{
            font-family: Arial;
        }

        h1{
            font-size: 40px;
        }

        .red{
            color: white;
            background-color: red;
        }

        .blue{
            color: white;
            background-color: blue;
        }

        .green{
            color: white;
            background-color: green;
        }

        .purple{
            color: white;
            background-color: purple;
        }

        button{
            background-color: black;
            color: white;
            padding: 10px;
        }
    </style>
</head>

<body>

    <h1>ჩემი საყვარელი ფერები</h1>

    <ul>
        <li class="red">წითელი</li>
        <li class="blue">ლურჯი</li>
        <li class="green">მწვანე</li>
        <li class="purple">იისფერი</li>
    </ul>

    <button>დაჭირე</button>

</body>
</html>
