<body>
    <h1 class="title">ჩემი პროფილი</h1>
 
    <p class="text">
        მე ვარ <b>გიორგი მამუკაშვილი</b>, პროგრამისტი და შემოქმედი.
        <i>ვიზიარებ ჩემს გამოცდილებას ვებ განვითარებაში</i> და
        მიყვარს ახალი ტექნოლოგიების შესწავლა.
        ჩემი მიზანია <u>შევქმნა სასარგებლო და ლამაზი ვებ გვერდები</u>,
        რომლებიც ადამიანებს დაეხმარება ყოველდღიურ ცხოვრებაში.
    </p>
