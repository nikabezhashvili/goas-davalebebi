<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="div1">
            <h1>Get in Touch</h1>
            <p>Fill out the form below and we'll get back to you as soon as possible.</p>            <br>
            <form>
                <div id="nm">
                    <label for="name">Name</label><br>
                    <input type="text" id="name" placeholder=" Your name" required><br><br>
                </div>
                <div id="em">
                    <label for="email">Email</label><br>
                    <input type="email" id="email" placeholder=" Your email" required><br><br>
                </div>
                <div id="ph">
                    <label for="phone">Phone</label><br>
                    <input type="text" id="phone" placeholder=" +1 (234) 56789" required><br><br>
                </div>
                <div id="mes">
                    <label for="message">Message</label><br>
                    <textarea id="message" placeholder="Your message" required></textarea>
                </div>
                <button>Send Message</button>

            </form>  
    </div>
</body>
</html>
