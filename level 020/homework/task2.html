<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Personal Information</title>
</head>
<body>

  <fieldset>
    <legend>User personal information</legend>

    <p>
      <label for="fullname">Enter your full name</label><br>
      <input type="text" id="fullname" name="fullname" value="Rahul Kumar">
    </p>

    <p>
      <label for="email">Enter your email</label><br>
      <input type="email" id="email" name="email" value="geeks@12345gmail.com">
    </p>

    <p>
      <label for="password">Enter your password</label><br>
      <input type="password" id="password" name="password">
    </p>

    <p>
      <label for="confirm">Confirm your password</label><br>
      <input type="password" id="confirm" name="confirm">
    </p>

    <p>Enter your gender</p>
    <label><input type="radio" name="gender" value="male" checked> Male</label>
    <label><input type="radio" name="gender" value="female"> Female</label>
    <label><input type="radio" name="gender" value="others"> Others</label>

    <p>
      <label for="dob">Enter your Date of Birth</label><br>
      <input type="date" id="dob" name="dob" value="2009-06-10">
    </p>

    <p>
      <label for="address">Enter your Address:</label><br>
      <textarea id="address" name="address">Noida Sector 137</textarea>
    </p>

    <p>
      <input type="submit" value="submit">
    </p>

  </fieldset>

</body>
</html>
