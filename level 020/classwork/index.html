<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>My feedback form</h2>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password"><br><br>

        <p>Please check all the emotions that apply to you:</p>
        <input type="checkbox" id="angry" name="emotion" value="angry" checked>
        <label for="angry">Angry</label><br>

        <input type="checkbox" id="sad" name="emotion" value="sad">
        <label for="sad">Sad</label><br>

        <input type="checkbox" id="happy" name="emotion" value="happy">
        <label for="happy">Happy</label><br>

        <input type="checkbox" id="ambivalent" name="emotion" value="ambivalent">
        <label for="ambivalent">Ambivalent</label><br><br>

        <p>How satisfied were you with our service?</p>
        <input type="radio" id="very_satisfied" name="satisfaction" value="very_satisfied" checked>
        <label for="very_satisfied">Very satisfied</label><br>

        <input type="radio" id="satisfied" name="satisfaction" value="satisfied">
        <label for="satisfied">Satisfied</label><br>

        <input type="radio" id="didnt_care" name="satisfaction" value="didnt_care">
        <label for="didnt_care">Didn't care</label><br>

        <input type="radio" id="dissatisfied" name="satisfaction" value="dissatisfied">
        <label for="dissatisfied">Dissatisfied</label><br>

        <input type="radio" id="very_dissatisfied" name="satisfaction" value="very_dissatisfied">
        <label for="very_dissatisfied">Very dissatisfied</label><br><br>

        <label for="comments">Further comments:</label><br>
        <textarea id="comments" name="comments" rows="4" cols="40"></textarea><br><br>

        <label for="bio">Bio photo:</label>
        <input type="file" id="bio" name="bio"><br><br>

        <label for="location">Location visited:</label>
        <select id="location" name="location">
            <option value="">Select location</option>
            <option value="tbilisi">Tbilisi</option>
            <option value="batumi">Batumi</option>
            <option value="kutaisi">Kutaisi</option>
        </select><br><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
