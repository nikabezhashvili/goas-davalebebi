<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>List Style Examples</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h3>1. Disc</h3>
    <ul class="disc">
        <li>Apple</li>
        <li>Banana</li>
        <li>Cherry</li>
    </ul>

    <h3>2. Circle</h3>
    <ul class="circle">
        <li>Dog</li>
        <li>Cat</li>
        <li>Bird</li>
    </ul>

    <h3>3. Square</h3>
    <ul class="square">
        <li>Red</li>
        <li>Green</li>
        <li>Blue</li>
    </ul>

    <h3>4. Decimal</h3>
    <ol class="decimal">
        <li>First</li>
        <li>Second</li>
        <li>Third</li>
    </ol>

    <h3>5. Roman Numerals</h3>
    <ol class="roman">
        <li>Chapter I</li>
        <li>Chapter II</li>
        <li>Chapter III</li>
    </ol>
</body>

</html>
